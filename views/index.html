<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Situs Penyedia API Key</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex justify-center items-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-96">
        <h1 class="text-2xl font-bold text-center text-indigo-400 mb-6">REST API DASHBOARD</h1>
        
        <form action="/auth" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm mb-1">Username</label>
                <input type="text" name="username" required class="w-full p-2 rounded bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm mb-1">Password</label>
                <input type="password" name="password" required class="w-full p-2 rounded bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <div class="flex space-x-2 pt-2">
                <button type="submit" name="action" value="login" class="w-1/2 bg-indigo-600 hover:bg-indigo-700 p-2 rounded font-semibold transition">Login</button>
                <button type="submit" name="action" value="register" class="w-1/2 bg-gray-600 hover:bg-gray-500 p-2 rounded font-semibold transition">Daftar</button>
            </div>
        </form>
    </div>
</body>
</html>
