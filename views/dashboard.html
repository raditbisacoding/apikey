<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center border-b border-gray-700 pb-4 mb-6">
            <h1 class="text-2xl font-bold text-indigo-400">Selamat Datang, <span id="username-display">...</span>!</h1>
            <a href="/" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-semibold">Logout</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-gray-800 p-4 rounded-lg shadow">
                <p class="text-gray-400 text-sm">API Key Anda</p>
                <p id="apikey-display" class="text-lg font-mono text-green-400 font-bold mt-1">Memuat...</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg shadow">
                <p class="text-gray-400 text-sm">Sisa Limit Hari Ini</p>
                <p id="limit-display" class="text-2xl font-bold text-yellow-400 mt-1">0</p>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg shadow">
            <h2 class="text-xl font-semibold text-indigo-300 mb-4">📖 Dokumentasi API (Contoh)</h2>
            
            <div class="border-l-4 border-indigo-500 bg-gray-750 p-4 rounded mb-4 bg-gray-750 bg-opacity-50">
                <span class="bg-green-600 px-2 py-1 rounded text-xs font-bold mr-2">GET</span>
                <code class="text-sm">/api/fitur/cuaca</code>
                <p class="text-gray-400 text-xs mt-2">Mendapatkan data informasi cuaca suatu kota.</p>
                
                <p class="text-sm font-semibold mt-3 text-gray-300">Parameter:</p>
                <ul class="list-disc list-inside text-xs text-gray-400 ml-2">
                    <li><code class="text-indigo-400">apikey</code> (Wajib) - API Key Anda</li>
                    <li><code class="text-indigo-400">kota</code> (Opsional) - Nama Kota (Default: Jakarta)</li>
                </ul>

                <p class="text-sm font-semibold mt-3 text-gray-300">Contoh URL Request:</p>
                <textarea id="example-url" readonly class="w-full p-2 bg-gray-900 rounded text-xs font-mono text-indigo-300 mt-1 h-10 resize-none"></textarea>
            </div>
        </div>
    </div>

    <script>
        // Ambil nama user dari URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('username');

        // Ambil data statistik user dari API Backend saat halaman dimuat
        if (username) {
            fetch(`/api/user-stats?username=${username}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('username-display').innerText = data.username;
                    document.getElementById('apikey-display').innerText = data.apikey;
                    document.getElementById('limit-display').innerText = data.limit;
                    
                    // Set contoh URL dinamis sesuai API Key user
                    const fullUrl = `${window.location.origin}/api/fitur/cuaca?kota=Bandung&apikey=${data.apikey}`;
                    document.getElementById('example-url').value = fullUrl;
                });
        } else {
            window.location.href = '/';
        }
    </script>
</body>
</html>
